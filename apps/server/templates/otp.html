<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />

    <style>
      @media (prefers-color-scheme: dark) {
        body {
          background: #0c0c0c !important;
          color: #ededed !important;
        }

        .email-container {
          background: #141414 !important;
        }

        .text-muted {
          color: #b0b0b0 !important;
        }

        .footer-text {
          color: #999999 !important;
        }

        .otp-code {
          color: #ededed !important;
        }

        .footer-td {
          border-top: 1px solid #999999 !important;
        }
      }
    </style>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background: #fafafa;
      font-family:
        -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial,
        sans-serif;
      color: #1a1a1a;
    "
  >
    <!-- preview text -->
    <div style="display: none; max-height: 0; overflow: hidden">
      Your verification code is {{otpCode}}.
    </div>

    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background: #fafafa; padding: 32px 0"
    >
      <tr>
        <td align="center">
          <!-- container -->
          <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            class="email-container"
            style="max-width: 600px; background: #ffffff; border-radius: 10px; padding: 36px 32px"
          >
            <!-- header -->
            <tr>
              <td align="center">
                <div
                  style="
                    font-family: Georgia, &quot;Times New Roman&quot;, serif;
                    font-size: 36px;
                    color: #d4b034;
                    margin-bottom: 4px;
                  "
                >
                  Locklet
                </div>

                <div class="text-muted" style="font-size: 14px; margin-bottom: 36px">
                  Your Voice, Even If You're Silent
                </div>

                <div style="font-size: 16px; margin-bottom: 20px">{{headline}}</div>
              </td>
            </tr>

            <!-- OTP code - prominent, centered -->
            <tr>
              <td align="center" style="padding: 10px 0 10px 0">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td align="center">
                      <div
                        style="width: 60px; height: 2px; background: #d4b034; margin-bottom: 20px"
                      ></div>

                      <div
                        class="otp-code"
                        style="
                          font-family: Georgia, &quot;Times New Roman&quot;, serif;
                          font-size: 42px;
                          font-weight: 600;
                          letter-spacing: 8px;
                          color: #d4b034;
                          margin: 0 auto;
                        "
                      >
                        {{otpCode}}
                      </div>

                      <div
                        style="width: 60px; height: 2px; background: #d4b034; margin-top: 20px"
                      ></div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- expiry and disclaimer -->
            <tr>
              <td align="center" style="padding-bottom: 32px">
                <div class="text-muted" style="font-size: 14px; margin-bottom: 8px">
                  {{expiryText}}
                </div>

                <div class="text-muted" style="font-size: 13px">
                  If you didn't request this, you can safely ignore this email.
                </div>
              </td>
            </tr>

            <!-- footer -->
            <tr>
              <td
                class="footer-td"
                align="center"
                style="padding-top: 32px; border-top: 1px solid #eee"
              >
                <div class="footer-text" style="font-size: 12px; color: #777">
                  Powered by
                  <a href="{{baseUrl}}" style="color: #777; text-decoration: none"> PropertyOS </a>
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
