# Railway: set this service's "Config file path" to apps/server/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile.server"
watchPatterns = ["apps/server/**", "packages/**", "docker/Dockerfile.server"]

[deploy]
startCommand = "dumb-init pm2-runtime start ecosystem.config.cjs"
restartPolicyType = "ON_FAILURE"
