# Railway: create a service named e.g. "server-email-worker" and set
# "Config file path" to apps/server/railway.email-worker.toml
#
# Uses the same image as the API (docker/Dockerfile.server) with a worker start command.
# Copy env vars from the server service (DB, AWS, JWT not required for sends but harmless)
# Required: TENANT_EMAIL_CAMPAIGNS_ENABLED=true, REDIS_URL (Railway Redis reference)

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile.server"
watchPatterns = ["apps/server/**", "packages/**", "docker/Dockerfile.server"]

[deploy]
startCommand = "dumb-init node apps/server/dist/apps/server/src/workers/tenant-email-worker.cli.js"
restartPolicyType = "ON_FAILURE"
