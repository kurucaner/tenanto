<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var ltk = "tenanto-admin-theme";
          var k = "propertyos-admin-theme";
          var ltv = localStorage.getItem(ltk);
          if (ltv !== null && localStorage.getItem(k) === null) {
            localStorage.setItem(k, ltv);
            localStorage.removeItem(ltk);
          }
          var lpk = "tenanto-admin-dark-preset";
          var pk = "propertyos-admin-dark-preset";
          var lpv = localStorage.getItem(lpk);
          if (lpv !== null && localStorage.getItem(pk) === null) {
            localStorage.setItem(pk, lpv);
            localStorage.removeItem(lpk);
          }
          var ok = ["noir", "obsidian", "evergreen", "plum", "ember", "inkwell"];
          var t = localStorage.getItem(k) || "system";
          if (t !== "light" && t !== "dark" && t !== "system") t = "system";
          var r = document.documentElement;
          r.dataset.theme = t;
          var d =
            t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          r.classList.toggle("dark", d);
          r.style.colorScheme = d ? "dark" : "light";
          if (d) {
            var pv = localStorage.getItem(pk) || "noir";
            if (ok.indexOf(pv) < 0) pv = "noir";
            r.setAttribute("data-dark-preset", pv);
          } else {
            r.removeAttribute("data-dark-preset");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>PropertyOS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
