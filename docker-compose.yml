services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    env_file: apps/server/.env
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=host.docker.internal
      - PORT=3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    env_file: apps/web/.env
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_DD_CLIENT_TOKEN: ${VITE_DD_CLIENT_TOKEN}
        VITE_DD_ENV: ${VITE_DD_ENV:-production}
        VITE_DD_RUM_APPLICATION_ID: ${VITE_DD_RUM_APPLICATION_ID}
        VITE_DD_RUM_PROXY_URL: ${VITE_DD_RUM_PROXY_URL}
        VITE_DD_SITE: ${VITE_DD_SITE:-us5.datadoghq.com}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-0.0.0}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_WEB_APP_URL: ${VITE_WEB_APP_URL:-${NEXT_PUBLIC_SITE_URL:-https://propertyos.app}}
    ports:
      - "3002:4173"
    environment:
      - PORT=4173
    restart: unless-stopped

  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DD_SITE=${DD_SITE:-us5.datadoghq.com}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3002,http://localhost:5174,http://localhost:3003}
    restart: unless-stopped

  tenant:
    build:
      context: .
      dockerfile: docker/Dockerfile.tenant
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_DD_CLIENT_TOKEN: ${VITE_DD_CLIENT_TOKEN}
        VITE_DD_ENV: ${VITE_DD_ENV:-production}
        VITE_DD_RUM_APPLICATION_ID: ${VITE_DD_RUM_APPLICATION_ID}
        VITE_DD_RUM_PROXY_URL: ${VITE_DD_RUM_PROXY_URL}
        VITE_DD_SITE: ${VITE_DD_SITE:-us5.datadoghq.com}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-0.0.0}
        VITE_WEB_APP_URL: ${VITE_WEB_APP_URL:-${NEXT_PUBLIC_SITE_URL:-https://propertyos.app}}
    ports:
      - "3003:4174"
    environment:
      - PORT=4174
    restart: unless-stopped
